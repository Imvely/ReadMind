# ReadMind 로컬 개발 인프라 (명세서 §7, §8 Phase 0 첫 항목)
# 기본 기동: postgres(pgvector) + redis + minio + 버킷 초기화.
#   docker compose up -d
# 애플리케이션(ai-service/backend)은 해당 Dockerfile 생성 후 app 프로파일로 기동:
#   docker compose --profile app up -d
# 모든 시크릿/접속정보는 .env 에서 주입한다(하드코딩 금지, CLAUDE.md §3).

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: readmind-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # pgvector 확장 등록 등 최초 1회 초기화 스크립트
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: readmind-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: readmind-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # 웹 콘솔
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # 최초 기동 시 S3 버킷 생성 후 종료(일회성)
  createbuckets:
    image: minio/mc
    container_name: readmind-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${S3_BUCKET} &&
      echo 'bucket ${S3_BUCKET} ready';
      "
    restart: "no"

  # ── 애플리케이션 (Dockerfile 생성 후 --profile app 으로 기동) ──
  ai-service:
    profiles: ["app"]
    build: ./ai-service
    container_name: readmind-ai-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  backend:
    profiles: ["app"]
    build: ./backend
    container_name: readmind-backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
